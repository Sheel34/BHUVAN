<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI',Inter,sans-serif">
  <defs>
    <radialGradient id="space" cx="32%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#12141b"/>
      <stop offset="60%" stop-color="#0b0c10"/>
      <stop offset="100%" stop-color="#060709"/>
    </radialGradient>
    <radialGradient id="moon" cx="38%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#d7d9df"/>
      <stop offset="55%" stop-color="#9a9ca4"/>
      <stop offset="85%" stop-color="#5d5f66"/>
      <stop offset="100%" stop-color="#2c2e34"/>
    </radialGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#f4f6ff"/>
      <stop offset="100%" stop-color="#8fa3c8"/>
    </linearGradient>
    <radialGradient id="rim" cx="50%" cy="50%" r="50%">
      <stop offset="78%" stop-color="#7fb8ff" stop-opacity="0"/>
      <stop offset="96%" stop-color="#7fb8ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7fb8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <rect width="1200" height="420" fill="url(#space)"/>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="120" cy="60" r="1.1" opacity="0.7"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="540" cy="44" r="1" opacity="0.5"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="80" r="1.3" opacity="0.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1110" cy="180" r="1" opacity="0.5"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="300" r="1.2" opacity="0.6"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3.9s" repeatCount="indefinite"/></circle>
    <circle cx="430" cy="360" r="1" opacity="0.4"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="250" cy="120" r="0.9" opacity="0.5"/>
    <circle cx="760" cy="330" r="1.1" opacity="0.5"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="350" r="0.9" opacity="0.4"/>
    <circle cx="610" cy="150" r="0.8" opacity="0.4"/>
  </g>

  <!-- Moon, centered at (300,210) -->
  <g transform="translate(300 210)">
    <circle r="150" fill="url(#rim)"/>
    <circle r="132" fill="url(#moon)"/>
    <!-- craters rotate slowly -->
    <g opacity="0.5">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="80s" repeatCount="indefinite"/>
      <circle cx="-44" cy="-30" r="20" fill="#000" opacity="0.16"/>
      <circle cx="38" cy="20" r="30" fill="#000" opacity="0.14"/>
      <circle cx="10" cy="-58" r="12" fill="#000" opacity="0.18"/>
      <circle cx="-20" cy="55" r="16" fill="#000" opacity="0.15"/>
      <circle cx="62" cy="-40" r="10" fill="#000" opacity="0.16"/>
      <circle cx="-70" cy="36" r="9" fill="#000" opacity="0.14"/>
    </g>
    <!-- terminator shadow -->
    <circle r="132" fill="#05060a" opacity="0.0"/>
    <path d="M 0 -132 A 132 132 0 0 1 0 132 A 92 132 0 0 0 0 -132 Z" fill="#05060a" opacity="0.42"/>

    <!-- orbiting mission markers -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
      <g transform="translate(132 0)">
        <circle r="5" fill="#e8c97a"><animate attributeName="r" values="4;6.5;4" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle r="11" fill="#e8c97a" opacity="0.16" filter="url(#soft)"/>
      </g>
      <g transform="rotate(140) translate(132 0)">
        <circle r="5" fill="#9ad0c2"><animate attributeName="r" values="4;6.5;4" dur="2.6s" repeatCount="indefinite"/></circle>
        <circle r="11" fill="#9ad0c2" opacity="0.16" filter="url(#soft)"/>
      </g>
      <g transform="rotate(255) translate(132 0)">
        <circle r="5" fill="#e06a6a"><animate attributeName="r" values="4;6.5;4" dur="2.0s" repeatCount="indefinite"/></circle>
        <circle r="11" fill="#e06a6a" opacity="0.16" filter="url(#soft)"/>
      </g>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(545 150)">
    <text x="0" y="0" font-size="92" font-weight="800" letter-spacing="4" fill="url(#wordmark)">BHUVAN</text>
    <text x="4" y="44" font-size="20" font-weight="500" letter-spacing="2" fill="#8fb3a1">Planetary Terrain Intelligence</text>
    <text x="4" y="86" font-size="14.5" letter-spacing="0.5" fill="#70768a" font-family="'JetBrains Mono',monospace">Quantified lunar surface assessment from real orbital data.</text>
    <!-- scan line -->
    <rect x="4" y="108" width="560" height="2" fill="#93a4c4" opacity="0.25"/>
    <rect x="4" y="108" width="120" height="2" fill="#93a4c4">
      <animate attributeName="x" values="4;444;4" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
