# BHUVAN — Redis broker + API gateway + Celery worker.
# The React/Three.js frontend service is added in Phase 2 (see AGENTS.md).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      BHUVAN_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.tasks.celery_worker.celery_app worker --loglevel=info
    environment:
      BHUVAN_REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
